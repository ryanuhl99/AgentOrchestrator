version: "3.9"

services:

  planneragent:
    build:
      context: .
      dockerfile: PlannerAgent/Dockerfile
    ports:
      - "5000:8080"
      - "9229:9229"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  researchagent:
    build:
      context: .
      dockerfile: ResearchAgent/Dockerfile
    ports:
      - "5001:8080"

  codeagent:
    build:
      context: .
      dockerfile: CodeAgent/Dockerfile
    ports:
      - "5002:8080"

  reviewagent:
    build:
      context: .
      dockerfile: ReviewAgent/Dockerfile
    ports:
      - "5003:8080"